name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Squad CLI
        run: npm install -g @bradygaster/squad-cli

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install baseline CLI tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux jq ripgrep

      - name: Install security tooling
        run: python -m pip install semgrep

      - name: Show key tool versions
        run: |
          node --version
          npm --version
          python --version
          squad --version || true
          semgrep --version || true

      - name: Install repository dependencies when present
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi

          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

          if [ -f pyproject.toml ]; then
            python -m pip install .
          fi
